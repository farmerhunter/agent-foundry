success_criteria:
  - provider feasibility is verified or explicitly deferred before implementation
  - provider source, quota_model, refresh semantics, credential shape, and failure states are documented
  - provider bugs caused by external facts are traced to a named failed assumption and checked across code, UI, tests, and docs
  - adapter tests cover success and failure paths before implementation is declared done
  - dashboard and configuration behavior flow through explicit contracts or ViewModels
  - existing provider actions and summaries remain isolated
  - pipeline tests cover error-path identity and status propagation
  - implementation plan and design decisions reflect the final state
review_cadence: monthly
review_after_days: 90
evidence_summary: Created from repeated token-panic provider integrations across DeepSeek, OpenAI Platform, ChatGPT/Codex, and Kimi/Moonshot planning, where missing API verification, config contracts, dashboard action contracts, and glue-code tests caused avoidable cross-agent rework.
