id: ASSET-COLLAB-001
title: Agent Collaboration
asset_type: skill
status: active
version: 3
created: 2026-05-28
updated: 2026-06-07
purpose: Guide GitHub issue, pull request, Project/Epic scheduling, multi-agent synchronization, CLI comment, document conversion, and interruption-resume workflows.
responsibility: Apply collaboration and delivery practices that preserve traceability, repo-local workflow contracts, verification, safe synchronization, and continuity across humans and agents.
non_responsibility: Does not maintain Agent Foundry lifecycle records, import external skills, or make architecture decisions except when collaboration workflow boundaries require escalation.
inputs:
  - GitHub issue or pull request context
  - GitHub Project, Epic, label, or issue queue context
  - repository sync state
  - user approval or merge policy
  - repo-local workflow contract or issue execution contract
  - completion and verification evidence
  - CLI comment body or generated document deliverable
process:
  - identify whether the task touches issues, PRs, multi-agent sync, CLI comments, document conversion, or resumed work
  - when bootstrapping multi-agent work, create or locate the repo-local workflow contract before handing issues to Implementers
  - apply the matching collaboration, implementation, or testing practice
  - for Implementer pickup, read Project/label state plus issue execution contracts before creating branches or PRs
  - when executing a task list from another agent or user, verify each item against the original list before declaring done
  - preserve durable traceability in issues, PRs, comments, or verification records
  - validate with artifact-specific checks
  - continue from the newest user request after interruption or compaction
outputs:
  - issue or PR workflow recommendations
  - repo-local workflow contract recommendations
  - Project/Epic/label queue guidance
  - Execution Contract and pickup confirmation guidance
  - completion and verification comments
  - dual-surface review handoff comments
  - safe merge or hold decisions
  - synchronization guidance
  - safe CLI comment handling
  - render-verified document conversion results
