# Repo-neutral GitHub collaboration role routing template.
# Copy into a target repository config surface only after that repository chooses
# to use the collaboration helper workflow. This file is inert documentation.

schema_version: 1
repository:
  selection_order:
    - explicit_owner_repo_argument
    - AGENT_REPO
    - current_git_remote_after_confirmation
  unresolved_behavior: "fail_closed_with_guidance"
  default_repo: null

roles:
  architect:
    inbox_label: "needs:architect"
    review_target: "architecture, policy, scope, dependency gates"
  implementer:
    inbox_label: "needs:implementer"
    review_target: "scoped implementation and verification"
  reviewer:
    inbox_label: "needs:reviewer"
    review_target: "independent review and acceptance recommendation"
  tester:
    inbox_label: "needs:tester"
    review_target: "test planning, test matrix, evidence execution, and residual risk handoff"
  harvester:
    inbox_label: "needs:harvester"
    review_target: "practice or asset harvest workflow"
  human:
    inbox_label: "needs:human"
    review_target: "human decision contract or manual trial"

needs_labels:
  - "needs:architect"
  - "needs:implementer"
  - "needs:reviewer"
  - "needs:tester"
  - "needs:harvester"
  - "needs:human"

completion_handoff:
  required_fields:
    - scope
    - changed_files
    - verification
    - residual_risks
    - safety_confirmations
    - workflow_telemetry
    - compact_rehydration_packet_when_used
    - next_owner
  dispatch_evidence_modes:
    - live_thread_dispatch
    - github_comment
    - generated_note
    - portable_prompt

github:
  auth_check: "read target repository before mutation planning"
  retry_policy: "bounded_retry_for_transient_network_or_rate_limit_only"
  markdown_comment_mode: "body_file_or_api_safe"
  mutation_default: "preview"
  operation_policy: "hybrid_runtime_discovery_then_connector_helper_api_bare_gh"
  runtime_discovery_required_per_session: true
  connector_preferred_for_low_risk:
    - issue_pr_reads
    - top_level_comments
    - issue_create_update
    - label_add_remove
    - pr_metadata
  helper_first_for:
    - scheduler_semantics
    - issue_context
    - handoff_shaping
    - dispatch_evidence
    - telemetry
    - audit
    - dry_run_preview
    - fail_closed_permission_checks
  current_helper_comment_write_apply: false
  controlled_gh_api_fallback: "body_file_or_structured_json_when_connector_unavailable_or_unclear"
  bare_gh_last_resort: "short_low_risk_comments_only_with_bounded_retry_and_failure_recording"
  project_v2_policy: "optional_visual_mirror_only_no_generalized_write_policy"
  runtime_approval_prompt_boundary: "workflow_authorization_does_not_override_app_level_approval_prompts"

project_v2:
  mode: "optional_visual_mirror"
  source_of_truth: false
  require_explicit_config_for_reads: true
  unit_a_writes_allowed: false
  missing_config_behavior: "continue_with_issue_pr_label_comment_state"

telemetry:
  required_for_meaningful_transitions: true
  workflow: "workflows/coordinate-agent-work.md"
  supports_workflow_comparison: true
  supports_improved_pilot_instrumentation: true
  comparison_modes:
    - single_agent_baseline
    - unoptimized_collaboration_counterfactual
    - optimized_collaboration_observed
  next_pilot_fields:
    observed_counter_available: optional
    observed_counter_source: optional
    elapsed_time_available: optional
    elapsed_time_source: optional
    github_api_read_attempts: optional
    github_api_failures: optional
    project_read_attempts: optional
    project_write_attempts: optional
    fallback_review_used: optional
    fallback_review_reason: optional
    hdc_superseded_count: optional
    label_cleanup_count: optional
    source_threads_count: optional
    dispatch_mechanism: optional
    durable_links_count: optional
    closure_sync_passes: optional
    stale_state_repairs: optional
  unknown_value_policy: "use unknown or not_available instead of guessing"
  ledger_parent_issue: "<parent-issue-number>"
  skip_rule: "only trivial comments may skip telemetry with an explicit reason"

forbidden_defaults:
  repository: null
  project_owner: null
  project_number: null
  project_field_ids: []
  project_option_ids: []
  cache_path: null
  issue_numbers: []
  branch_names: []
